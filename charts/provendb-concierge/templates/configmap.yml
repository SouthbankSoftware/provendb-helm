apiVersion: v1
kind: ConfigMap
metadata:
  name: provendb-concierge-configmap
  namespace: {{ .Release.Namespace }}
data:
  concierge.state.db.uri: {{ .Values.user.mongo.uri | quote }}
  concierge.tree.host.port:  provendb-tree-service.{{ .Release.Namespace }}.svc.cluster.local:{{  .Values.tree.host.port }}
  jaeger-agent.host.port: {{ .Values.global.jaegeragent.host.port }}
  concierge.helm.chart.version: {{ .Values.helmChartVersion }}
  
