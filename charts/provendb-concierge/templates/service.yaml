apiVersion: v1
kind: Service
metadata:
  name: provendb-concierge-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: provendb-concierge-{{ .Release.Name }}
  ports:
    - name: provendb-concierge-{{ .Release.Name }}-grpc-port
      port: {{ .Values.grpc.port }}
      targetPort: {{ .Values.grpc.port }}
      protocol: TCP
    - name: provendb-concierge-{{ .Release.Name }}-prometheus-port
      port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port}}
      protocol: TCP