apiVersion: v1
kind: Service
metadata:
  name: provendb-concierge
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: provendb-concierge
  ports:
    - name: provendb-concierge-grpc-port
      port: {{ .Values.grpc.port }}
      targetPort: {{ .Values.grpc.port }}
      protocol: TCP
    - name: provendb-concierge-prometheus-port
      port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port}}
      protocol: TCP