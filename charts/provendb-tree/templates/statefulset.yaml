##################################################################################################
# Deployment
##################################################################################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: provendb-tree-{{ .Release.Name }}-statefulset
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: provendb-tree-{{ .Release.Name }}-service
  replicas: 1
  selector:
    matchLabels:
      app: provendb-tree-{{ .Release.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: {{ .Values.tree.prometheus.enable | quote }}
        prometheus.io/port: {{ .Values.tree.prometheus.port | quote }}
        sidecar.istio.io/inject: {{ .Values.istioSidecarInject | quote }} 
      labels:
        app: provendb-tree-{{ .Release.Name }}
    spec:
      containers:
      - name: mongodb-cache
        image: mongo:latest
        imagePullPolicy: Always
        volumeMounts:
        - name: mongodb-cache-data
          mountPath: /data/db
        readinessProbe: 
          exec:
            command:
            - bash
            - "-c"
            - |
              mongo --eval "db.stats()" --port ${MONGODBCACHE_PORT} --host ${MONGODBCACHE_BIND_IP}
          initialDelaySeconds: 60 #wait this period after staring fist time
          periodSeconds: 30    # polling interval every 30 seconds
          timeoutSeconds: 60 
        livenessProbe: 
          exec:
            command:
            - bash
            - "-c"
            - |
              mongo --eval "db.stats()" --port ${MONGODBCACHE_PORT} --host ${MONGODBCACHE_BIND_IP}
          initialDelaySeconds: 60 #wait this period after staring fist time
          periodSeconds: 30    # polling interval every 30 seconds
          timeoutSeconds: 60   
        command: ["/bin/bash", "-c"]
        # args: ["-c","tail -f /etc/hosts"]
        args: [ "-c", "(mongod  --fork --logpath /var/log/mongod.log --port ${MONGODBCACHE_PORT} --bind_ip ${MONGODBCACHE_BIND_IP} --replSet test) && \
                                    mongo --eval \"rs.initiate({_id: 'test',
                                                                members: [
                                                                    {
                                                                    _id: 0,
                                                                    host: '127.0.0.1:${MONGODBCACHE_PORT}'
                                                                    },
                                                                ]
                                                                })\" --port ${MONGODBCACHE_PORT} --host 127.0.0.1 && \
                                    tail -f /var/log/mongod.log"]
        env:
          - name: MONGODBCACHE_BIND_IP
            valueFrom:
              configMapKeyRef:
                name: provendb-tree-{{ .Release.Name }}-configmap
                key: mongodbcache.bind.ip
          - name: MONGODBCACHE_PORT
            valueFrom:
              configMapKeyRef:
                name: provendb-tree-{{ .Release.Name }}-configmap
                key: mongodbcache.port
      - name: tree-service
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: Always
        ports:
        - containerPort: {{ .Values.tree.host.port }}
        - containerPort: {{ .Values.tree.prometheus.port }}
        resources: 
{{ toYaml .Values.tree.resources | indent 10 }}  
        readinessProbe:
          tcpSocket:
            port: {{ .Values.tree.host.port }}
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 60
        livenessProbe:
          tcpSocket:
            port: {{ .Values.tree.host.port }}
          initialDelaySeconds: 30
          periodSeconds: 120 
          timeoutSeconds: 60
        command: ["./tree"]
        env:
          - name: TREE_CACHE_DB_URI
            valueFrom:
              configMapKeyRef:
                name: provendb-tree-{{ .Release.Name }}-configmap
                key: tree.cachedb.uri
          - name: TREE_HOST_PORT
            valueFrom:
              configMapKeyRef:
                name: provendb-tree-{{ .Release.Name }}-configmap
                key: tree.host.port
          - name: TREE_ENV
            valueFrom:
              configMapKeyRef:
                name: provendb-tree-{{ .Release.Name }}-configmap
                key: tree.treeenv
  volumeClaimTemplates:
  - metadata:
      name: mongodb-cache-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: fast
      resources:
        requests:
          storage: {{ .Values.mongodbcache.size }}