apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-proxy-configmap
  namespace: {{ .Release.Namespace }}
data:
  proxy.mongodb.uri: {{ .Values.proxy.mongodb.uri | quote }}
  proxy.mongodb.ssl: {{ .Values.proxy.mongodb.ssl | quote }}
  
  proxy.port: {{ .Values.proxy.port | quote }}
  proxy.userDatabases: {{ .Values.proxy.userDatabases | quote }}

  proxy.treeservice.host: {{ .Values.proxy.treeservice.host | quote }}
  proxy.treeservice.port: {{ .Values.proxy.treeservice.port | quote }}
  proxy.treeservice.dbinstance: {{ .Values.proxy.treeservice.dbinstance | quote }}
  proxy.max.connections: {{ .Values.proxy.maxconnections | quote }}
  proxy.max.threads: {{ .Values.proxy.maxthreads | quote }}
  proxy.authentication.mechanism: {{ .Values.proxy.authentication | quote }}