##################################################################################################
# Proxy service
##################################################################################################
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-proxy-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}-proxy
  ports:
    - name: {{ .Release.Name }}-proxy-port
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.proxy.port }} 
      protocol: TCP
  type: {{ .Values.service.type }}
