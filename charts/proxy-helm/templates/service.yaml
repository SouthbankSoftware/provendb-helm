apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Release.Name }}
  ports:
    - name: {{ .Release.Name }}-port
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.proxy.port }} 
      protocol: TCP
  type: {{ .Values.service.type }}
