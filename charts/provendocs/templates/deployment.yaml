
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provendocs-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: provendocs-{{ .Release.Name }}
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: {{ .Values.istioSidecarInject | quote }} 
      labels:
        app: provendocs-{{ .Release.Name }}
    spec:
      containers:
      - name: provendocs
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: Always  
        livenessProbe:
          httpGet:
              path: /api/checkStatus
              port: {{ .Values.http.port }}
          initialDelaySeconds: 5 #wait this period after starting fist time
          periodSeconds: 30  # polling interval
          timeoutSeconds: 60    # wish to receive response within this time period
        readinessProbe: 
          httpGet:
              path: /api/checkStatus
              port: {{ .Values.http.port }}
          initialDelaySeconds: 5 #wait this period after staring fist time
          periodSeconds: 30    # polling interval
          timeoutSeconds: 60 
        ports:
        - containerPort: {{ .Values.http.port }}
        command: ["/bin/ash"]
        args: ["-c","node -- bin/www"] 
        # args: ["-c", "tail -f /etc/resolv.conf"]
        env:
          - name: GITHUB_LOGIN_AUTH_CALLBACK
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.github.login.auth.callback

          - name: GITHUB_SIGNUP_CALLBACK
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.github.signup.callback

          - name: GOOGLE_AUTH_CALLBACK
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.google.auth.callback

          - name: GOOGLE_SIGNUP_CALLBACK
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.google.signup.callback

          - name: PROVENDOCS_URI
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.uri

          - name: USER_MODULE_URL
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.user.module.url
                
          - name: DOCS_URL
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.docs.url
                
          - name: API_URL
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.api.url

          - name: INTERNAL_API_URL
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.internal.api.url     

          - name: PROVENDOCS_ENV
            valueFrom:
              configMapKeyRef:
                name: provendocs-{{ .Release.Name }}-configmap
                key: provendocs.env    