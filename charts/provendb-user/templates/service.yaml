apiVersion: v1
kind: Service
metadata:
  name: provendb-user-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: provendb-user
  ports:
    - name: http-port
      port: {{ .Values.http.port }}
      targetPort: {{ .Values.http.port }}
      protocol: TCP
    - name: grpc-port
      port: {{ .Values.grpc.port }}
      targetPort: {{ .Values.grpc.port }}
      protocol: TCP     