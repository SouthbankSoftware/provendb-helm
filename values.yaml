provendb-proxy:
  enabled: true
  proxy:
    image:
      repository: southbanksoftware/provendb-proxy
      tag: prd 
    prometheus: 
      enable: false  
    service:
      type: LoadBalancer
    auth:
      enabled: "true"
      password: password
      uri: mongodb://localhost:27017
      username: admin
    sidecarmongodb:
      bindip: 127.0.0.1
      image:
        repository: mongo
        tag: 4.2.0
      port: 27017
    sslEnabled: "false"
    userDatabases: provendb
    env: prd

provendb-tree:
  enabled: true
  tree:
    targetDB: "provendb"
    image:
      repository: southbanksoftware/provendb-tree
      tag: prd
    env: prd  
  jaegeragent: 
    host:
      port: "" 
    disabled: true
      

provendb-concierge:
  enabled: true
  grpc:
    port: 10002
  prometheus:
    port: 10003  
  image:
      repository: southbanksoftware/provendb-concierge
      tag: prd  

provendb-anchor:
  enabled: true
  anchor:
    image:
      repository: southbanksoftware/provendb-anchor
      tag: prd
    verifier:
      uriPrefix: http://localhost:11000
    endpoint: https://rinkeby.infura.io/v3/ba25a62205f24e5bb74d4f9738910a83
    private-key: EB3AF8DD18646CBF1BFAF5644338D7941909718C2FFFE170E4D5F6860A88AFE5
  env: prd   
  prometheus: 
    enable: false
  istioSidecarInject: false   

mongodb:
  mongodbUsername: sbs
  mongodbPassword: testtest
  mongodbRootPassword: root123
  service:
    name: mongodb-service
  mongodbDatabase: provendb  
  replicaSet:
    enabled: true
    replicas:
      secondary: 0
      arbiter: 0  
  
global:
  targetDBURI: mongodb://sbs:testtest@mongodb-service/provendb
  blockcypher:
    token: 2fb5bd3c929741f9a67be3be85b3e161
  cloud: "DOCKER_DESKTOP_KUBERNETES"  
  # Can be one of the following:
  # 1. GCP
  # 2. AZURE
